<script src="https://unpkg.com/three@0.160.0/build/three.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL = "https://umuigzmzujsnvwmnkbgy.supabase.co"
const SUPABASE_KEY = "sb_publishable_8p4PHMYjV_UDXWToyEbGuQ_tzBY26jh"

const supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer()

renderer.setSize(
window.innerWidth,
window.innerHeight
)

document.getElementById("map").appendChild(renderer.domElement)

camera.position.set(0,10,10)
camera.lookAt(0,0,0)


// zemin

const floorGeometry = new THREE.PlaneGeometry(30,30)

const floorMaterial = new THREE.MeshBasicMaterial({
color:0x333333,
side:THREE.DoubleSide
})

const floor = new THREE.Mesh(
floorGeometry,
floorMaterial
)

floor.rotation.x = Math.PI/2

scene.add(floor)



// sensörleri tutacak liste

let sensors = []



function createSensor(x,y,id){

const geometry = new THREE.SphereGeometry(0.4)

const material = new THREE.MeshBasicMaterial({
color:0x00ff00
})

const mesh = new THREE.Mesh(
geometry,
material
)

mesh.position.set(x,0.4,y)

scene.add(mesh)

sensors.push({
id:id,
mesh:mesh
})

}



async function loadSensors(){

const {data,error} = await supabase
.from("sensors")
.select("*")

data.forEach(s=>{

createSensor(
s.x,
s.y,
s.id
)

})

}

loadSensors()



// yangın kontrol

async function checkFire(){

const {data,error} = await supabase
.from("sensors")
.select("*")

data.forEach(dbSensor=>{

const sensor = sensors.find(
s=>s.id==dbSensor.id
)

if(!sensor) return

if(dbSensor.type == "fire"){

sensor.mesh.material.color.set(0xff0000)

}

})

}

setInterval(checkFire,2000)



// yangın tüpü

function createExtinguisher(x,y){

const geometry = new THREE.BoxGeometry(
0.5,
1,
0.5
)

const material = new THREE.MeshBasicMaterial({
color:0xffaa00
})

const mesh = new THREE.Mesh(
geometry,
material
)

mesh.position.set(x,0.5,y)

scene.add(mesh)

}


createExtinguisher(4,4)
createExtinguisher(-6,3)



// basit rota

function createPath(){

const material = new THREE.LineBasicMaterial({
color:0x00ffff
})

const points = []

points.push(new THREE.Vector3(0,0.1,0))
points.push(new THREE.Vector3(5,0.1,5))

const geometry = new THREE.BufferGeometry().setFromPoints(points)

const line = new THREE.Line(geometry,material)

scene.add(line)

}

createPath()



function animate(){

requestAnimationFrame(animate)

renderer.render(scene,camera)

}

animate()

</script>
